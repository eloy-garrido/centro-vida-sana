name: Actualizar fecha sitemap

on:
  push:
    branches: [main]

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reemplazar fechas lastmod con fecha actual
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "Sitemap actualizado → ${TODAY}"

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet sitemap.xml || (
            git add sitemap.xml &&
            git commit -m "chore: actualizar lastmod sitemap [skip ci]"
          )

      - name: Push
        run: git push
